<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恆星演化模擬器 | 宇宙煉金術</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #02040a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 2.5rem; box-sizing: border-box; }
        
        /* 毛玻璃面板樣式 */
        .glass-panel { 
            background: rgba(5, 8, 16, 0.85); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(30, 41, 59, 1); 
            border-radius: 0.75rem; 
            padding: 1.5rem; 
            pointer-events: auto; 
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
        }
        
        .panel-hidden { opacity: 0; transform: translateY(60px); pointer-events: none; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #3b82f6; border: 2px solid white; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); margin-top: -6px; transition: transform 0.2s; }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(51, 65, 85, 1); border-radius: 2px; }
        
        button { pointer-events: auto; transition: all 0.2s ease; }
        button:hover { transform: translateY(-1px); box-shadow: 0 10px 25px -5px rgba(30, 58, 138, 0.4); }
        button:active { transform: translateY(0); }

        #cinematic-subtitle { 
            position: absolute; 
            bottom: 12%; 
            left: 50%; 
            transform: translateX(-50%); 
            text-align: center; 
            width: 70%; 
            pointer-events: none; 
            opacity: 0; 
            transition: opacity 0.6s ease; 
        }
        .show-subtitle { opacity: 1 !important; }
        
        .status-badge { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(30, 41, 59, 1); border-radius: 0.5rem; padding: 1rem; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>
    </div>

    <div id="ui-layer">
        <!-- 頂部：資訊與重置 -->
        <div class="glass-panel w-full max-w-5xl mx-auto flex justify-between items-center" style="border-radius: 0.75rem;">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-600 to-cyan-300 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-white">STELLAR ALCHEMY <span class="text-slate-500 font-mono text-xs ml-2">PRO</span></h1>
                    <p class="text-[10px] text-blue-400 font-mono uppercase tracking-widest">恆星演化動力學模擬器</p>
                </div>
            </div>

            <div class="flex-1 flex justify-center">
                <div class="text-center">
                    <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Current Stage</div>
                    <div id="stage-display" class="text-xl font-bold text-emerald-400 transition-all duration-500">準備啟動</div>
                </div>
            </div>

            <div class="w-32 flex justify-end">
                <button id="btn-reset" class="hidden border border-slate-700 text-slate-400 hover:bg-slate-800 py-2 px-4 rounded-lg text-xs tracking-widest transition-colors font-mono">
                    RESET KERNEL
                </button>
            </div>
        </div>

        <!-- 中間：沉浸字幕 -->
        <div id="cinematic-subtitle">
            <div class="bg-slate-900/90 backdrop-blur-md border border-slate-800 p-6 rounded-xl inline-block shadow-2xl">
                <p id="live-desc" class="text-xl font-bold text-white tracking-wide transition-opacity duration-500 ease-in-out"></p>
            </div>
        </div>

        <!-- 新增：赫羅圖面板 -->
        <div id="hr-panel" class="glass-panel panel-hidden" style="position: absolute; bottom: 2.5rem; right: 2.5rem; width: 280px; height: 240px; padding: 1.5rem; display: flex; flex-direction: column;">
            <div class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-3">Hertzsprung-Russell Path</div>
            <div style="position: relative; flex-grow: 1; border-left: 1px solid rgba(51, 65, 85, 1); border-bottom: 1px solid rgba(51, 65, 85, 1);">
                <canvas id="hrCanvas" style="position: absolute; top:0; left:0; width:100%; height:100%;"></canvas>
                <div style="position: absolute; bottom: -18px; left: 0; width: 100%; display: flex; justify-content: space-between; font-size: 8px; color: #64748b; padding-left: 2px;">
                    <span>30,000K</span><span>5,800K</span><span>3,000K</span>
                </div>
                <div style="position: absolute; top: 0; left: -32px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; font-size: 8px; color: #64748b; padding-top: 2px; text-align: right; width: 28px;">
                    <span>10⁴</span><span>1L☉</span><span>10⁻⁴</span>
                </div>
            </div>
        </div>

        <!-- 底部：控制中心 -->
        <div id="setup-panel" class="glass-panel w-full max-w-5xl mx-auto flex flex-col md:flex-row gap-8 items-stretch pt-6 pb-6 px-8 rounded-xl shadow-2xl">
            
            <div class="flex-[1.5] flex flex-col justify-between w-full">
                <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Initial Parameters</h2>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-slate-900/50 p-3 border border-slate-800 rounded-lg">
                        <div class="text-[9px] text-slate-500 uppercase mb-1">Initial Mass (M☉)</div>
                        <div id="mass-display" class="text-2xl font-mono font-bold text-blue-400">1.0</div>
                    </div>
                    <div class="bg-slate-900/50 p-3 border border-slate-800 rounded-lg">
                        <div class="text-[9px] text-slate-500 uppercase mb-1">Surface Temp (K)</div>
                        <div id="temp-display" class="text-2xl font-mono font-bold text-cyan-400">5,800</div>
                    </div>
                </div>
                <div class="p-3 bg-blue-500/5 border border-blue-500/20 rounded-lg flex-1">
                    <div class="text-[9px] font-bold text-blue-400 uppercase tracking-widest mb-2">Stage Prediction</div>
                    <div id="desc-display" class="text-xs italic text-slate-400 leading-relaxed font-sans transition-opacity duration-500 ease-in-out">請調整下方滑桿，決定恆星的命運。</div>
                </div>
            </div>

            <div class="flex-1 w-full space-y-6 flex flex-col justify-center">
                <div class="p-4 bg-slate-900/40 rounded-lg border border-slate-800">
                    <div class="flex justify-between text-[9px] font-bold text-slate-500 mb-3 uppercase tracking-widest">
                        <span>0.1 (Brown Dwarf)</span>
                        <span class="text-yellow-500">1.0</span>
                        <span>40.0 (Hypergiant)</span>
                    </div>
                    <input type="range" id="mass-slider" class="w-full accent-blue-500" min="0.1" max="40" step="0.1" value="1.0">
                </div>
                <button id="btn-start" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg text-xs tracking-widest shadow-lg shadow-blue-900/40 uppercase">
                    Execute Evolution
                </button>
            </div>
        </div>
    </div>

<script>
/**
 * 恆星演化模擬器 - 電腦沉浸版 (升級版)
 */
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let width, height;

const setupPanel = document.getElementById('setup-panel');
const hrPanel = document.getElementById('hr-panel');
const cinematicSubtitle = document.getElementById('cinematic-subtitle');
const massSlider = document.getElementById('mass-slider');
const massDisplay = document.getElementById('mass-display');
const stageDisplay = document.getElementById('stage-display');
const tempDisplay = document.getElementById('temp-display');
const descDisplay = document.getElementById('desc-display');
const liveDesc = document.getElementById('live-desc');
const btnStart = document.getElementById('btn-start');
const btnReset = document.getElementById('btn-reset');

// HR圖設定
const hrCanvas = document.getElementById('hrCanvas');
const hrCtx = hrCanvas.getContext('2d');
let hrPath = []; // 儲存軌跡

let isRunning = false;
let currentTick = 0;
let initialMass = 1.0;
let particles = [];
let flashAlpha = 0;
let msT = 500; // 主序星壽命

// 平滑視覺過渡用的全域變數
let visualR = 0;
let visualExpand = 1;
let visualGlow = 0;
let uiFadeTimeout = null;
let currentStageDisplayTimeout = null;

const STAGES = { IDLE: -1, NEBULA: 0, PROTOSTAR: 1, MAIN_SEQUENCE: 2, GIANT: 3, DEATH: 4 };
let currentStage = STAGES.IDLE;

function getStarColor(mass) {
    if (mass >= 15) return { hex: '#a5d8ff', temp: '30,000+' }; 
    if (mass >= 3) return { hex: '#ffffff', temp: '10,000' }; 
    if (mass >= 0.8) return { hex: '#fff9c4', temp: '5,800' }; 
    return { hex: '#ffab91', temp: '3,000' }; 
}

class Particle {
    constructor(x, y, vx, vy, color, life, size, friction = 1) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.color = color; this.life = life; this.maxLife = life; this.size = size;
        this.alpha = 1;
        this.friction = friction;
    }
    update() {
        this.x += this.vx; this.y += this.vy; this.life--;
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.alpha = Math.max(0, this.life / this.maxLife);
    }
    draw(ctx) {
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function updateInfo(text) {
    descDisplay.style.opacity = 0;
    liveDesc.style.opacity = 0;
    clearTimeout(uiFadeTimeout);
    uiFadeTimeout = setTimeout(() => {
        descDisplay.innerText = text;
        liveDesc.innerText = text;
        descDisplay.style.opacity = 1;
        liveDesc.style.opacity = 1;
    }, 500);
}

massSlider.addEventListener('input', (e) => {
    if(isRunning) return;
    initialMass = parseFloat(e.target.value);
    massDisplay.innerText = initialMass.toFixed(1);
    let info = getStarColor(initialMass);
    tempDisplay.innerText = info.temp;
    
    if(initialMass < 0.4) updateInfo("小質量恆星：預計演化為白矮星，壽命極長。");
    else if(initialMass <= 8) updateInfo("中質量恆星：演化末期會膨脹為紅巨星，最終留下白矮星。");
    else updateInfo("大質量恆星：核心壓力巨大，將化作超新星並噴發出重元素！");
});

btnStart.addEventListener('click', () => { if (!isRunning) startSimulation(); });
btnReset.addEventListener('click', () => { resetSimulation(); });

function startSimulation() {
    isRunning = true; currentTick = 0; particles = []; hrPath = [];
    
    // 【升級1】講義知識點：主序星壽命與質量的非線性關係式修正 (t ∝ M^-2.5)
    // 這裡我們映射 Ticks 作為視覺演出 (1 太陽質量為基準 400 ticks)
    msT = Math.floor(400 * Math.pow(initialMass, -1.5));
    msT = Math.max(80, Math.min(800, msT)); // 控制在合理區間以確保視覺可以觀看

    setupPanel.classList.add('panel-hidden');
    hrPanel.classList.remove('panel-hidden'); // 顯示 HR 圖
    cinematicSubtitle.classList.add('show-subtitle');
    btnReset.classList.remove('hidden');
    
    // 生成星雲粒子
    for(let i=0; i<400; i++) {
        let angle = Math.random() * Math.PI * 2;
        let dist = Math.random() * Math.min(width, height) * 0.45;
        particles.push(new Particle(
            width/2 + Math.cos(angle)*dist, height/2 + Math.sin(angle)*dist,
            -Math.cos(angle) * (Math.random()*0.6 + 0.1), -Math.sin(angle) * (Math.random()*0.6 + 0.1),
            `rgba(100, 160, 255, ${Math.random()*0.5+0.3})`, 250, Math.random() * 3 + 1
        ));
    }
    setStage(STAGES.NEBULA);
}

function resetSimulation() {
    isRunning = false; currentStage = STAGES.IDLE; particles = []; flashAlpha = 0;
    setupPanel.classList.remove('panel-hidden');
    hrPanel.classList.add('panel-hidden'); // 隱藏 HR 圖
    cinematicSubtitle.classList.remove('show-subtitle');
    btnReset.classList.add('hidden');
    stageDisplay.innerText = "準備啟動";
    stageDisplay.style.color = "#fbbf24"; // yellow-400
    ctx.fillStyle = '#02040a';
    ctx.fillRect(0, 0, width, height);
}

function setStage(stage) {
    currentStage = stage;
    switch(stage) {
        case STAGES.NEBULA:
            stageDisplay.innerText = "星雲塌縮階段";
            stageDisplay.style.color = "#94a3b8"; // slate-400
            updateInfo("星際物質受重力吸引開始聚集，勢能轉化為熱能...");
            break;
        case STAGES.PROTOSTAR:
            stageDisplay.innerText = "原恆星點火";
            stageDisplay.style.color = "#f97316"; // orange-500
            tempDisplay.innerText = "15,000,000";
            updateInfo("核心溫度達到 1500 萬 K！氫核融合點火成功！");
            break;
        case STAGES.MAIN_SEQUENCE:
            stageDisplay.innerText = "主序星階段";
            stageDisplay.style.color = getStarColor(initialMass).hex;
            updateInfo(`流體靜力平衡。預期相對壽命：${(msT/400).toFixed(2)} 倍太陽壽命。`);
            break;
        case STAGES.GIANT:
            stageDisplay.innerText = initialMass > 8 ? "紅超巨星" : "紅巨星";
            stageDisplay.style.color = "#ef4444"; // red-500
            updateInfo("核心燃料耗盡，輻射壓不支！外層氣體受熱後劇烈膨脹。");
            break;
        case STAGES.DEATH:
            if(initialMass <= 8) {
                stageDisplay.innerText = initialMass < 0.4 ? "白矮星" : "行星狀星雲";
                stageDisplay.style.color = "#22d3ee"; // cyan-400
                updateInfo("外殼優雅地飄散至太空，中心留下一顆極高密度的白矮星。");
            } else {
                let r = initialMass >= 25 ? "黑洞 (Black Hole)" : "中子星 (Neutron Star)";
                stageDisplay.innerText = "超新星爆炸";
                stageDisplay.style.color = "#a855f7"; // purple-500
                updateInfo(`極限崩塌！超新星將珍貴的重元素噴發至宇宙中，核心化為${r}。`);
            }
            break;
    }
}

// 【升級3】繪製赫羅圖 (HR Diagram)
function drawHRDiagram() {
    hrCanvas.width = hrCanvas.clientWidth;
    hrCanvas.height = hrCanvas.clientHeight;
    
    // 主序帶半透明背景示意線
    hrCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    hrCtx.lineWidth = 20;
    hrCtx.lineCap = 'round';
    hrCtx.beginPath();
    hrCtx.moveTo(hrCanvas.width * 0.15, hrCanvas.height * 0.15); // O型熱星
    hrCtx.lineTo(hrCanvas.width * 0.85, hrCanvas.height * 0.85); // M型冷星
    hrCtx.stroke();

    // 歷史軌跡
    if (hrPath.length > 0) {
        hrCtx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        hrCtx.lineWidth = 2;
        hrCtx.beginPath();
        hrCtx.moveTo(hrPath[0].x * hrCanvas.width, hrPath[0].y * hrCanvas.height);
        for(let i=1; i<hrPath.length; i++) {
            hrCtx.lineTo(hrPath[i].x * hrCanvas.width, hrPath[i].y * hrCanvas.height);
        }
        hrCtx.stroke();
    }

    // 當前座標點
    if (currentStage >= STAGES.PROTOSTAR && currentStage <= STAGES.DEATH) {
        let hrPos = calculateHRPosition();
        if (hrPos) {
            hrPath.push(hrPos);
            
            hrCtx.fillStyle = getStarColor(initialMass).hex;
            if(currentStage === STAGES.GIANT) hrCtx.fillStyle = '#ef4444'; // red-500
            if(currentStage === STAGES.DEATH && initialMass <= 8) hrCtx.fillStyle = '#fff';
            
            hrCtx.shadowColor = hrCtx.fillStyle;
            hrCtx.shadowBlur = 10;
            hrCtx.beginPath();
            hrCtx.arc(hrPos.x * hrCanvas.width, hrPos.y * hrCanvas.height, 5, 0, Math.PI*2);
            hrCtx.fill();
            hrCtx.shadowBlur = 0;
            
            hrCtx.fillStyle = 'rgba(255,255,255,0.8)';
            hrCtx.beginPath();
            hrCtx.arc(hrPos.x * hrCanvas.width, hrPos.y * hrCanvas.height, 2, 0, Math.PI*2);
            hrCtx.fill();
        }
    }
}

// 計算赫羅圖座標映射
function calculateHRPosition() {
    let msX, msY;
    if (initialMass >= 15) { msX = 0.15; msY = 0.15; }
    else if (initialMass >= 3) { msX = 0.35; msY = 0.35; }
    else if (initialMass >= 0.8) { msX = 0.6; msY = 0.6; }
    else { msX = 0.85; msY = 0.85; }
    
    if (currentStage === STAGES.PROTOSTAR) {
        let progress = Math.min(1, Math.max(0, (currentTick - 180) / 100));
        return { x: 0.9 - progress*(0.9-msX), y: 0.15 + progress*(msY-0.15) };
    }
    else if (currentStage === STAGES.MAIN_SEQUENCE) {
        return { x: msX, y: msY };
    }
    else if (currentStage === STAGES.GIANT) {
        let progress = Math.min(1, Math.max(0, (currentTick - (280 + msT)) / 150));
        let giantX = 0.85; // 變冷
        let giantY = initialMass > 8 ? 0.05 : 0.15; // 變非常亮
        return { x: msX + progress*(giantX-msX), y: msY + progress*(giantY-msY) };
    }
    else if (currentStage === STAGES.DEATH) {
        if (initialMass <= 8) { // 白矮星
            let progress = Math.min(1, (currentTick - (280 + msT + 150)) / 100);
            return { x: 0.85 - progress*0.7, y: 0.15 + progress*0.75 };
        } else { // 超新星 
            let progress = Math.min(1, Math.max(0, (currentTick - (280 + msT + 150)) / 50));
            if (progress < 0.5) return { x: 0.85, y: 0.15 - progress * 0.3 };
            else return null; 
        }
    }
    return null;
}

function animate() {
    requestAnimationFrame(animate);
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(2, 4, 10, 0.4)';
    ctx.fillRect(0, 0, width, height);

    if (!isRunning) return;
    currentTick++;
    let cx = width / 2; let cy = height / 2;
    ctx.globalCompositeOperation = 'lighter';

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(); particles[i].draw(ctx);
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    let color = getStarColor(initialMass).hex;
    let baseR = 20 + Math.sqrt(initialMass) * 15;

    // 時間控制邏輯
    if (currentStage === STAGES.NEBULA && currentTick > 180) setStage(STAGES.PROTOSTAR);
    else if (currentStage === STAGES.PROTOSTAR && currentTick > 280) setStage(STAGES.MAIN_SEQUENCE);
    if (currentStage === STAGES.MAIN_SEQUENCE && currentTick > 280 + msT) setStage(STAGES.GIANT);
    if (currentStage === STAGES.GIANT && currentTick > 280 + msT + 150) {
        setStage(STAGES.DEATH);
        // 【升級2】 超新星重元素噴發特效
        if (initialMass > 8) {
            flashAlpha = 1.0;
            
            // 基礎白色爆炸波
            for(let i=0; i<400; i++) {
                let a = Math.random()*Math.PI*2; let s = Math.random()*25 + 5;
                particles.push(new Particle(cx, cy, Math.cos(a)*s, Math.sin(a)*s, '#fff', 180, Math.random()*3+1, 0.96));
            }
            
            // 重元素噴發粒子 (金、鉑、鐵等) 代表煉金術合成
            const heavyElements = ['#ffd700', '#e5e4e2', '#a19d94', '#c0c0c0', '#ff8c00', '#00eed1', '#ff1493'];
            for(let i=0; i<600; i++) {
                let a = Math.random()*Math.PI*2; let s = Math.random()*25 + 2;
                let col = heavyElements[Math.floor(Math.random()*heavyElements.length)];
                let p = new Particle(cx, cy, Math.cos(a)*s, Math.sin(a)*s, col, 250 + Math.random()*150, Math.random()*4+1, 0.985);
                p.vx += (Math.random()-0.5)*6; 
                p.vy += (Math.random()-0.5)*6;
                particles.push(p);
            }
        } else {
            // 小質量恆星的行星狀星雲噴發
            for(let i=0; i<300; i++) {
                let a = Math.random()*Math.PI*2; let s = Math.random()*5 + 0.5; 
                let col = `rgba(${Math.floor(Math.random()*50)}, ${Math.floor(Math.random()*150+100)}, 255, 0.8)`;
                particles.push(new Particle(cx, cy, Math.cos(a)*s, Math.sin(a)*s, col, 400 + Math.random()*100, Math.random()*5+1, 0.99));
            }
        }
    }

    // 繪製星體本體
    if (currentStage >= STAGES.PROTOSTAR && currentStage <= STAGES.GIANT) {
        let r = baseR;
        let bodyColor = color;
        if (currentStage === STAGES.PROTOSTAR) r *= (0.8 + Math.sin(currentTick*0.3)*0.1);
        if (currentStage === STAGES.GIANT) {
            let expand = Math.min(initialMass > 8 ? 6.5 : 4.5, 1 + (currentTick-(280+msT))/45);
            r *= expand;
            bodyColor = initialMass > 8 ? '#dc2626' : '#ef4444'; // deeper red for supergiants
        }
        
        let g = ctx.createRadialGradient(cx, cy, r*0.05, cx, cy, r*2.8);
        g.addColorStop(0, '#fff'); 
        g.addColorStop(0.15, bodyColor);
        if (currentStage === STAGES.GIANT) {
            let colorCore = initialMass > 8 ? 'rgba(220, 38, 38, 0.6)' : 'rgba(239, 68, 68, 0.6)';
            let colorEdge = initialMass > 8 ? 'rgba(185, 28, 28, 0.1)' : 'rgba(220, 38, 38, 0.1)';
            g.addColorStop(0.5, colorCore);
            g.addColorStop(0.8, colorEdge);
        }
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, r*2.8, 0, Math.PI*2); ctx.fill();
    } else if (currentStage === STAGES.DEATH) {
        if (initialMass <= 8) {
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2); ctx.fill();
            let g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
            g.addColorStop(0, 'rgba(255,255,255,0.6)'); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI*2); ctx.fill();
        } else if (initialMass >= 25) {
            // Flowing Particle/Line accretion disk
            let bhRadius = 55;
            let tilt = -Math.PI / 15;

            // 1. Core Lensed Halo
            ctx.globalCompositeOperation = 'lighter';
            let bgGlow = ctx.createRadialGradient(cx, cy, bhRadius * 0.9, cx, cy, bhRadius * 3.5);
            bgGlow.addColorStop(0, 'rgba(255, 220, 150, 0.35)');
            bgGlow.addColorStop(0.3, 'rgba(255, 100, 20, 0.15)');
            bgGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = bgGlow;
            ctx.beginPath(); ctx.arc(cx, cy, bhRadius * 3.5, 0, Math.PI*2); ctx.fill();

            // 2. Far side of Accretion Disk (Behind the event horizon)
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(tilt);
            
            for (let i = 0; i < 40; i++) {
                let p1 = Math.abs(Math.sin(i * 1.34));
                let p2 = Math.abs(Math.cos(i * 2.71));
                
                let rX = bhRadius * 1.3 + i * 4.5;
                let rY = rX * 0.22;
                let speed = 25 / (i + 4) * (1 + 0.5 * p1);
                
                ctx.beginPath();
                ctx.ellipse(0, 0, rX, rY, 0, Math.PI, Math.PI * 2);
                
                let grad = ctx.createLinearGradient(-rX, 0, rX, 0);
                grad.addColorStop(0, `rgba(255, 230, 200, ${0.15 / (i*0.1 + 1)})`);
                grad.addColorStop(0.3, `rgba(255, 150, 50, ${0.25 / (i*0.1 + 1)})`);
                grad.addColorStop(1, `rgba(150, 40, 0, ${0.05 / (i*0.1 + 1)})`);
                
                ctx.strokeStyle = grad;
                ctx.lineWidth = 1.5 + p2 * 2;
                let dashLen = 20 + p1 * 30;
                let gapLen = 10 + p2 * 20;
                ctx.setLineDash([dashLen, gapLen]);
                ctx.lineDashOffset = currentTick * speed; 
                ctx.stroke();
            }
            ctx.restore();

            // 3. Black Hole Event Horizon
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(cx, cy, bhRadius, 0, Math.PI*2); ctx.fill();

            // Photon ring
            ctx.lineWidth = 1.5;
            ctx.setLineDash([]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath(); ctx.arc(cx, cy, bhRadius, 0, Math.PI*2); ctx.stroke();

            // 4. Near side of Accretion Disk (Front)
            ctx.globalCompositeOperation = 'lighter';
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(tilt);
            
            for (let i = 0; i < 60; i++) {
                let p1 = Math.abs(Math.sin(i * 4.12));
                let p2 = Math.abs(Math.cos(i * 5.99));
                
                let rX = bhRadius * 1.1 + i * 4.0;
                let rY = rX * 0.22;
                let speed = 35 / (i + 3) * (1 + 0.3 * p2);
                
                ctx.beginPath();
                ctx.ellipse(0, 0, rX, rY, 0, 0, Math.PI);
                
                let grad = ctx.createLinearGradient(-rX, 0, rX, 0);
                grad.addColorStop(0, `rgba(200, 240, 255, ${0.6 / (i*0.08 + 1)})`); // Doppler blueshift
                grad.addColorStop(0.2, `rgba(255, 240, 200, ${0.9 / (i*0.08 + 1)})`);
                grad.addColorStop(0.6, `rgba(255, 120, 30, ${0.7 / (i*0.08 + 1)})`);
                grad.addColorStop(1, `rgba(180, 20, 0, ${0.15 / (i*0.08 + 1)})`); // Doppler redshift
                
                ctx.strokeStyle = grad;
                ctx.lineWidth = 1 + p1 * 2;
                let dashLen = 15 + p2 * 40;
                let gapLen = 8 + p1 * 15;
                ctx.setLineDash([dashLen, gapLen]);
                ctx.lineDashOffset = -currentTick * speed; // Negative moves dash leftward/forward
                ctx.stroke();
            }
            
            // Extra intense chaotic inner ring
            for (let i = 0; i < 20; i++) {
                let p1 = Math.abs(Math.sin(i * 7.12));
                let rX = bhRadius * 1.02 + i * 1.5;
                let rY = rX * 0.22;
                let speed = 60 / (i + 2);
                
                ctx.beginPath();
                ctx.ellipse(0, 0, rX, rY, 0, 0, Math.PI);
                
                let grad = ctx.createLinearGradient(-rX, 0, rX, 0);
                grad.addColorStop(0, `rgba(255, 255, 255, ${1.0 / (i*0.2 + 1)})`);
                grad.addColorStop(0.5, `rgba(255, 200, 100, ${0.9 / (i*0.2 + 1)})`);
                grad.addColorStop(1, `rgba(255, 50, 0, ${0.4 / (i*0.2 + 1)})`);
                
                ctx.strokeStyle = grad;
                ctx.lineWidth = 0.5 + p1 * 2;
                ctx.setLineDash([5 + p1 * 15, 5 + p1 * 5]);
                ctx.lineDashOffset = -currentTick * speed;
                ctx.stroke();
            }
            
            ctx.restore();
            ctx.setLineDash([]);
        } else {
            let p = Math.abs(Math.sin(currentTick*0.5));
            ctx.fillStyle = `rgba(150,255,255,${0.6+p*0.4})`; ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2); ctx.fill();
            ctx.save(); ctx.translate(cx, cy); ctx.rotate(currentTick*0.3);
            ctx.strokeStyle = `rgba(150,255,255,${0.2+p*0.4})`; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-100, 0); ctx.lineTo(100, 0); ctx.stroke();
            ctx.restore();
        }
    }

    if (flashAlpha > 0) {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`; ctx.fillRect(0, 0, width, height);
        flashAlpha -= 0.015;
    }

    // 渲染 UI 上的赫羅圖
    drawHRDiagram();
}
animate();
</script>
